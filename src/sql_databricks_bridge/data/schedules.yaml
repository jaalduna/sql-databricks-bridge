# Scheduled tasks for the bridge server.
# Each entry defines a named task with a cron-like schedule.
#
# Fields:
#   enabled:  true/false — whether the task runs automatically
#   hours:    list of UTC hours to run (0-23)
#   minutes:  list of minutes within each hour (0-59)
#   weekdays_only: true = Mon-Fri only, false = every day
#
# The on-demand API endpoints always work regardless of these settings.

schedules:

  # Databricks -> SQL Server reverse sync (event polling)
  event_poller:
    enabled: true
    hours: [9]
    minutes: [0]
    weekdays_only: true

  # SQL Server -> Databricks incremental sync (diff-sync)
  # 4:00 AM Ecuador (UTC-5) = 09:00 UTC
  diff_sync:
    enabled: true
    hours: [9, 10]
    minutes: [0, 15, 30, 45]
    weekdays_only: true
    countries: []          # empty = all discovered countries
    stage: sincronizacion
    lookback_months: 50
    all_tables: true
    table_suffix: _full
    deferred_phase2: true
